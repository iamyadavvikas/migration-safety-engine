name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -o mse-engine ./cmd/engine

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o mse-engine-linux-amd64 ./cmd/engine
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o mse-engine-darwin-amd64 ./cmd/engine
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o mse-engine-darwin-arm64 ./cmd/engine
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o mse-engine-windows-amd64.exe ./cmd/engine

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mse-engine-linux-amd64
            mse-engine-darwin-amd64
            mse-engine-darwin-arm64
            mse-engine-windows-amd64.exe
          generate_release_notes: true
