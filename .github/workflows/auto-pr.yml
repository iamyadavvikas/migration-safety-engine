name: Auto PR

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-pr:
    name: Create Dependabot PR
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR for dependency updates
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependencies"
          title: "chore: weekly dependency update"
          body: |
            Automated weekly dependency update.
            
            This PR updates all dependencies to their latest versions.
            
            **Please review and merge after CI passes.**
          branch: auto/dependency-update
          delete-branch: true
          labels: |
            dependencies
            automated

  go-update:
    name: Check Go Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Update Go modules
        run: |
          go get -u ./...
          go mod tidy

      - name: Create PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Go modules"
          title: "chore: update Go modules"
          body: |
            Automated Go module update.
            
            Updated packages:
            ```
            go get -u ./...
            go mod tidy
            ```
          branch: auto/go-update
          delete-branch: true
          labels: |
            dependencies
            go
            automated

  frontend-update:
    name: Check Frontend Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Update npm packages
        working-directory: frontend
        run: |
          npm update
          npm audit fix --force || true

      - name: Create PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update frontend dependencies"
          title: "chore: update frontend dependencies"
          body: |
            Automated frontend dependency update.
            
            Updated packages in `frontend/`.
          branch: auto/frontend-update
          delete-branch: true
          labels: |
            dependencies
            frontend
            automated
