name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o mse-engine-linux-amd64 ./cmd/engine
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o mse-engine-darwin-amd64 ./cmd/engine
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o mse-engine-darwin-arm64 ./cmd/engine
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o mse-engine-windows-amd64.exe ./cmd/engine

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mse-engine-linux-amd64
            mse-engine-darwin-amd64
            mse-engine-darwin-arm64
            mse-engine-windows-amd64.exe
          generate_release_notes: true
