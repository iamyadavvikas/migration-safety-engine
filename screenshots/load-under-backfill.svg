<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="700" height="300" fill="url(#bg)" rx="12"/>

  <text x="350" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Load Under Backfill — Real Performance Numbers</text>
  <line x1="40" y1="42" x2="660" y2="42" stroke="#334155" stroke-width="1"/>

  <!-- Stats boxes -->
  <rect x="30" y="60" width="200" height="90" rx="10" fill="#065f46" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="85" text-anchor="middle" fill="#6ee7b7" font-size="11">Writes During Migration</text>
  <text x="130" y="115" text-anchor="middle" fill="#fff" font-size="26" font-weight="700">289,296</text>
  <text x="130" y="135" text-anchor="middle" fill="#6ee7b7" font-size="11">0 errors · 11,580 writes/sec</text>

  <rect x="250" y="60" width="200" height="90" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="350" y="85" text-anchor="middle" fill="#93c5fd" font-size="11">Write Latency (p99)</text>
  <text x="350" y="115" text-anchor="middle" fill="#fff" font-size="26" font-weight="700">4.43 ms</text>
  <text x="350" y="135" text-anchor="middle" fill="#93c5fd" font-size="11">Target SLO: 50 ms ✅</text>

  <rect x="470" y="60" width="200" height="90" rx="10" fill="#3b0f0f" stroke="#ef4444" stroke-width="1" filter="url(#shadow)"/>
  <text x="570" y="85" text-anchor="middle" fill="#fca5a5" font-size="11">Configuration</text>
  <text x="570" y="115" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">16 workers</text>
  <text x="570" y="135" text-anchor="middle" fill="#fca5a5" font-size="11">5k batch · 20ms throttle</text>

  <!-- Legend -->
  <rect x="30" y="175" width="640" height="105" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="350" y="195" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">What happened during the migration</text>
  <text x="50" y="218" fill="#cbd5e1" font-size="11">• 16 concurrent writers continuously updated rows on the SAME table as the migration</text>
  <text x="50" y="238" fill="#cbd5e1" font-size="11">• Migration backfilled 50,000 rows + built a concurrent index</text>
  <text x="50" y="258" fill="#cbd5e1" font-size="11">• Write p99 stayed at 4.43 ms — 11× inside the 50 ms SLO — with zero errors</text>
  <text x="50" y="278" fill="#cbd5e1" font-size="11">• Cutover gate verified full-table parity (1.0) before dropping the legacy column</text>
</svg>