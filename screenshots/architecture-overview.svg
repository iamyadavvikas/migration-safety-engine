<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Expand / Contract Migration — Zero-Downtime Schema Change</text>
  <line x1="100" y1="48" x2="800" y2="48" stroke="#334155" stroke-width="1"/>

  <!-- Phase 1: EXPAND -->
  <rect x="40" y="70" width="820" height="100" rx="10" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="460" y="90" text-anchor="middle" fill="#10b981" font-size="14" font-weight="600">Phase 1: EXPAND (Additive — Safe)</text>

  <rect x="60" y="105" width="220" height="48" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="170" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">ALTER TABLE ADD COLUMN</text>

  <line x1="280" y1="129" x2="330" y2="129" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="340" y="105" width="240" height="48" rx="8" fill="url(#green)" filter="url(#shadow)"/>
  <text x="460" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">CREATE INDEX CONCURRENTLY</text>

  <line x1="580" y1="129" x2="630" y2="129" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="640" y="105" width="200" height="48" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1"/>
  <text x="740" y="130" text-anchor="middle" fill="#6ee7b7" font-size="11">Old column still exists</text>
  <text x="740" y="145" text-anchor="middle" fill="#6ee7b7" font-size="11">Reads/writes unaffected</text>

  <!-- Phase 2: BACKFILL + VERIFY -->
  <rect x="40" y="190" width="820" height="110" rx="10" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="460" y="210" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="600">Phase 2: BACKFILL + VERIFY (Throttled &amp; Gated)</text>

  <rect x="60" y="225" width="200" height="48" rx="8" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="160" y="247" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Throttled Batch Backfill</text>
  <text x="160" y="263" text-anchor="middle" fill="#bfdbfe" font-size="10">5k rows · 20ms throttle</text>

  <line x1="260" y1="249" x2="310" y2="249" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="320" y="225" width="200" height="48" rx="8" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="420" y="247" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Shadow-Read Parity Check</text>
  <text x="420" y="263" text-anchor="middle" fill="#bfdbfe" font-size="10">5% sample · ≥ 99.9% match</text>

  <line x1="520" y1="249" x2="570" y2="249" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="580" y="225" width="240" height="48" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="700" y="247" text-anchor="middle" fill="#93c5fd" font-size="12">⛔ Cutover blocked if parity fails</text>
  <text x="700" y="263" text-anchor="middle" fill="#93c5fd" font-size="12">↳ Auto-rollback triggered</text>

  <text x="460" y="293" text-anchor="middle" fill="#64748b" font-size="11">Backfill is crash-resumable: kill -9 mid-batch resumes from last committed row</text>

  <!-- Phase 3: CANARY + CUTOVER -->
  <rect x="40" y="320" width="820" height="80" rx="10" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="460" y="340" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="600">Phase 3: CANARY + CUTOVER (SLO-Gated Traffic Shift)</text>

  <rect x="60" y="355" width="80" height="32" rx="6" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="100" y="375" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">1%</text>
  <line x1="140" y1="371" x2="150" y2="371" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="155" y="355" width="80" height="32" rx="6" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="195" y="375" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">5%</text>
  <line x1="235" y1="371" x2="245" y2="371" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="250" y="355" width="80" height="32" rx="6" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="290" y="375" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">25%</text>
  <line x1="330" y1="371" x2="340" y2="371" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="345" y="355" width="80" height="32" rx="6" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="385" y="375" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">100%</text>

  <line x1="425" y1="371" x2="455" y2="371" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="460" y="350" width="170" height="42" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1"/>
  <text x="545" y="370" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">✅ Cutover Gate</text>
  <text x="545" y="384" text-anchor="middle" fill="#6ee7b7" font-size="10">Full-table parity re-check</text>

  <line x1="630" y1="371" x2="660" y2="371" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="665" y="345" width="180" height="52" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
  <text x="755" y="365" text-anchor="middle" fill="#fdba74" font-size="11">⛔ If SLO breached at ANY step:</text>
  <text x="755" y="382" text-anchor="middle" fill="#fdba74" font-size="11">↳ Auto-rollback, drop new column</text>

  <!-- Phase 4: CONTRACT -->
  <rect x="40" y="415" width="820" height="80" rx="10" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="460" y="435" text-anchor="middle" fill="#f97316" font-size="14" font-weight="600">Phase 4: CONTRACT (Destructive — Only After Clean Canary)</text>

  <rect x="160" y="450" width="240" height="32" rx="8" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="280" y="471" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">DROP COLUMN legacy_shipping</text>

  <line x1="400" y1="466" x2="440" y2="466" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="450" y="445" width="240" height="42" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1"/>
  <text x="570" y="465" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">✅ MIGRATION COMPLETE</text>
  <text x="570" y="480" text-anchor="middle" fill="#6ee7b7" font-size="10">Zero downtime · Verified parity</text>
</svg>