<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="860" height="340" fill="url(#bg)" rx="12"/>

  <text x="430" y="30" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Durable State Machine — Crash-Resumable at Every Step</text>
  <line x1="60" y1="42" x2="800" y2="42" stroke="#334155" stroke-width="1"/>

  <!-- Row 1: Happy path -->
  <rect x="30" y="65" width="95" height="38" rx="19" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="77" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Pending</text>

  <line x1="125" y1="84" x2="150" y2="84" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="155" y="65" width="100" height="38" rx="19" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="205" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Expanding</text>

  <line x1="255" y1="84" x2="280" y2="84" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="285" y="65" width="105" height="38" rx="19" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="337" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Backfilling</text>

  <line x1="390" y1="84" x2="415" y2="84" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="420" y="65" width="100" height="38" rx="19" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="470" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Verifying</text>

  <line x1="520" y1="84" x2="545" y2="84" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="550" y="65" width="95" height="38" rx="19" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="597" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Canary</text>

  <line x1="645" y1="84" x2="670" y2="84" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="675" y="65" width="95" height="38" rx="19" fill="url(#g5)" filter="url(#shadow)"/>
  <text x="722" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Cutover</text>

  <line x1="770" y1="84" x2="790" y2="84" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="30" y="125" width="95" height="38" rx="19" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="77" y="149" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Contracting</text>

  <line x1="125" y1="144" x2="150" y2="144" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="155" y="125" width="95" height="38" rx="19" fill="url(#g7)" filter="url(#shadow)"/>
  <text x="202" y="149" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">✅ Done</text>

  <!-- Row 2: Rollback path -->
  <rect x="30" y="215" width="95" height="38" rx="19" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="77" y="239" text-anchor="middle" fill="#ef4444" font-size="11" font-style="italic">(from any state)</text>

  <line x1="125" y1="234" x2="155" y2="234" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <rect x="160" y="215" width="120" height="38" rx="19" fill="url(#g6)" filter="url(#shadow)"/>
  <text x="220" y="239" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">RollingBack</text>

  <line x1="280" y1="234" x2="310" y2="234" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="315" y="215" width="110" height="38" rx="19" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="370" y="239" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">RolledBack</text>

  <!-- Key properties -->
  <rect x="480" y="195" width="350" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="655" y="218" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Key Properties</text>
  <text x="500" y="238" fill="#64748b" font-size="11">• State + checkpoint persisted in a Postgres transaction</text>
  <text x="500" y="255" fill="#64748b" font-size="11">• Kill -9 at any point → resume from last committed state</text>
  <text x="500" y="272" fill="#64748b" font-size="11">• Even rollback is durable — interrupted mid-rollback resumes</text>

  <!-- Cutover gate annotation -->
  <rect x="480" y="55" width="350" height="55" rx="10" fill="#1e293b" stroke="#d97706" stroke-width="1"/>
  <text x="655" y="75" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">🔒 Cutover Gate (Point of No Return)</text>
  <text x="500" y="93" fill="#94a3b8" font-size="11">• Full-table parity re-check before destructive Contract step</text>
  <text x="500" y="107" fill="#94a3b8" font-size="11">• Any drifted or NULL row → diverts to RollingBack</text>
</svg>