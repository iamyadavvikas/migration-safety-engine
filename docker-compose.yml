services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mse
      POSTGRES_PASSWORD: mse
      POSTGRES_DB: mse
    ports:
      - "5499:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mse -d mse"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:latest
    ports:
      # Host 3002 to avoid colliding with other local apps on :3000/:3001 (e.g. a
      # Next.js dev server and tweakresume). Grafana still listens on 3000 inside
      # the container.
      - "3002:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
